  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

\"{ background: m.gradient, boxShadow: '0 8px 24px -8px '+m.shadow }\"><\u002Fspan>\n              <span class=\"relative inline-flex items-center gap-2\">\n                <span class=\"h-1.5 w-1.5 rounded-full\" :style=\"{ background: active === i ? '#fff' : m.dot }\"><\u002Fspan>\n                {{ m.label }}\n              <\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Desktop morphing visual -->\n        <div class=\"reveal mt-10\">\n          <div class=\"mock-dark mx-auto max-w-5xl rounded-3xl border hairline glass overflow-hidden shadow-glow\">\n            <!-- Window bar -->\n            <div class=\"win-bar flex items-center justify-between px-4 py-2.5 border-b hairline\">\n              <div class=\"flex items-center gap-2\">\n                <span class=\"h-2.5 w-2.5 rounded-full bg-white/20\"><\u002Fspan>\n                <span class=\"h-2.5 w-2.5 rounded-full bg-white/20\"><\u002Fspan>\n                <span class=\"h-2.5 w-2.5 rounded-full bg-white/20\"><\u002Fspan>\n                <span class=\"ml-3 text-[11px] font-mono text-white/45\">desktop · {{ currentMode.label.toLowerCase() }}.mode<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"text-[11px] font-mono text-white/40 flex items-center gap-3\">\n                <span>Ctrl ⇧ {{ currentMode.hotkey }}<\u002Fspan>\n                <span class=\"inline-flex items-center gap-1\">\n                  <span class=\"h-1.5 w-1.5 rounded-full\" :style=\"{ background: currentMode.dot }\"><\u002Fspan>\n                  active\n                <\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Desktop area -->\n            <div class=\"relative h-[360px] sm:h-[420px] p-3 sm:p-4 bg-black/30\">\n              <div class=\"absolute inset-0 grid-noise opacity-50 pointer-events-none\"><\u002Fdiv>\n              <div class=\"absolute inset-0 pointer-events-none\" :style=\"{ background: 'radial-gradient(600px 280px at 50% 0%, '+currentMode.glow+', transparent 60%)' }\"><\u002Fdiv>\n\n              <div class=\"relative h-full grid gap-3\" :style=\"{ gridTemplateColumns: currentMode.cols, gridTemplateRows: currentMode.rows }\">\n                <div v-for=\"(tile, idx) in currentMode.tiles\" :key=\"currentMode.id + '-' + idx\" class=\"app-tile rounded-xl border hairline relative overflow-hidden\" :style=\"{ gridColumn: tile.c, gridRow: tile.r, background: tile.bg }\">\n                  <!-- chrome -->\n                  <div class=\"absolute top-0 inset-x-0 h-7 px-2.5 border-b hairline flex items-center gap-1.5 bg-black/20 backdrop-blur-sm z-10\">\n                    <span class=\"h-1.5 w-1.5 rounded-full bg-white/25\"><\u002Fspan>\n                    <span class=\"h-1.5 w-1.5 rounded-full bg-white/25\"><\u002Fspan>\n                    <span class=\"h-1.5 w-1.5 rounded-full bg-white/25\"><\u002Fspan>\n                    <span class=\"ml-1.5 text-[10px] font-mono text-white/75 truncate\">{{ tile.app }}<\u002Fspan>\n                    <span v-if=\"tile.tag\" class=\"ml-auto text-[9px] font-mono uppercase tracking-wider text-white/45\">{{ tile.tag }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <!-- app UI -->\n                  <div class=\"absolute inset-0 pt-7 overflow-hidden\" v-html=\"tileUI(tile.kind, tile.note)\"><\u002Fdiv>\n                  <!-- caption -->\n                  <div class=\"absolute bottom-1.5 left-2.5 right-2.5 text-[9px] text-white/35 font-mono truncate pointer-events-none\">{{ tile.note }}<\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Taskbar -->\n            <div class=\"win-bar flex items-center justify-between border-t hairline px-3 py-1.5\">\n              <div class=\"flex items-center gap-1.5\">\n                <!-- System tray (start / search / task view) -->\n                <button class=\"h-6 w-6 rounded grid place-items-center border hairline bg-white/[.04] hover:bg-white/10 transition\" title=\"Start\">\n                  <svg class=\"h-3 w-3\" viewBox=\"0 0 24 24\" fill=\"currentColor\" style=\"color:#60a5fa\"><path d=\"M3 5l8-1.2v8.4H3V5Zm0 14v-7.8h8V20.2L3 19Zm9-15.4L21 2.5v9.7h-9V3.6Zm0 16.8v-9.7h9V21.5L12 20.4Z\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n                <button class=\"h-6 w-6 rounded grid place-items-center border hairline bg-white/[.04] hover:bg-white/10 transition\" title=\"Search\">\n                  <svg class=\"h-3 w-3 text-white/65\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><circle cx=\"11\" cy=\"11\" r=\"6\"><\u002Fcircle><path d=\"m20 20-3.5-3.5\"><\u002Fpath><\u002Fsvg>\n                <\u002Fbutton>\n                <button class=\"h-6 w-6 rounded grid place-items-center border hairline bg-white/[.04] hover:bg-white/10 transition\" title=\"Task view\">\n                  <svg class=\"h-3 w-3 text-white/65\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"4\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"14\" y=\"4\" width=\"7\" height=\"7\" rx=\"1\"><\u002Frect><rect x=\"3\" y=\"15\" width=\"7\" height=\"5\" rx=\"1\"><\u002Frect><rect x=\"14\" y=\"15\" width=\"7\" height=\"5\" rx=\"1\"><\u002Frect><\u002Fsvg>\n                <\u002Fbutton>\n                <span class=\"mx-1 h-4 w-px bg-white/10\"><\u002Fspan>\n                <!-- Per-mode app icons -->\n                <button v-for=\"(t, i) in currentMode.tiles\" :key=\"'task-'+currentMode.id+'-'+i\" class=\"h-6 w-6 rounded grid place-items-center border hairline relative overflow-hidden transition hover:brightness-125\" :style=\"{ background: appIcon(t.app).bg }\" :title=\"t.app\">\n                  <span class=\"text-[9px] font-bold leading-none\" :style=\"{ color: appIcon(t.app).fg }\">{{ appIcon(t.app).g }}<\u002Fspan>\n                  <span class=\"absolute bottom-0 left-1/2 -translate-x-1/2 h-0.5 w-2 rounded-full\" :style=\"{ background: currentMode.dot }\"><\u002Fspan>\n                <\u002Fbutton>\n              <\u002Fdiv>\n              <div class=\"flex items-center gap-2.5 text-[10px] font-mono text-white/45\">\n                <span class=\"hidden sm:inline\">{{ currentMode.tiles.length }} apps · layout {{ currentMode.layout }} · DND {{ currentMode.dnd ? 'on' : 'off' }}<\u002Fspan>\n                <!-- System tray icons -->\n                <div class=\"flex items-center gap-1.5\">\n                  <svg class=\"h-3 w-3\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" :class=\"currentMode.dnd ? 'text-rose-300' : 'text-white/55'\" :title=\"currentMode.dnd ? 'Do Not Disturb' : 'Notifications on'\">\n                    <path v-if=\"currentMode.dnd\" d=\"M12 22a3 3 0 0 0 2.83-2H9.17A3 3 0 0 0 12 22ZM4 4l16 16M19 17H6V11a6 6 0 0 1 8-5.6\"><\u002Fpath>\n                    <path v-else=\"\" d=\"M6 8a6 6 0 0 1 12 0v5l1.5 3h-15L6 13V8ZM9 19a3 3 0 0 0 6 0\"><\u002Fpath>\n                  <\u002Fsvg>\n                  <svg class=\"h-3 w-3 text-white/55\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">\n                    <path d=\"M2 8.8a14 14 0 0 1 20 0M5 12a10 10 0 0 1 14 0M8 15a6 6 0 0 1 8 0\"><\u002Fpath><circle cx=\"12\" cy=\"19\" r=\"1.2\" fill=\"currentColor\"><\u002Fcircle>\n                  <\u002Fsvg>\n                  <svg class=\"h-3 w-3 text-white/55\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\">\n                    <path d=\"M3 13c2-2 4-2 6 0s4 2 6 0 4-2 6 0M3 17c2-2 4-2 6 0s4 2 6 0 4-2 6 0M3 9c2-2 4-2 6 0s4 2 6 0 4-2 6 0\"><\u002Fpath>\n                  <\u002Fsvg>\n                  <span class=\"text-white/65 tabular-nums\">{{ clockHM }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Quick stats -->\n        <div class=\"reveal mt-12 grid grid-cols-2 sm:grid-cols-4 gap-3 text-center\">\n          <div v-for=\"s in stats\" :key=\"s.label\" class=\"rounded-2xl border hairline glass px-4 py-5\">\n            <div class=\"text-2xl sm:text-3xl font-semibold tracking-tight\" :style=\"{ color: s.color }\">{{ s.value }}<\u002Fdiv>\n            <div class=\"text-[11px] uppercase tracking-[0.14em] text-white/45 mt-1\">{{ s.label }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ─────────────────────────  PROBLEM / PROMISE  ───────────────────────── -->\n    <section id=\"why\" class=\"relative py-12 sm:py-16\">\n      <div class=\"mx-auto max-w-7xl px-5\">\n        <div class=\"max-w-2xl reveal\">\n          <span class=\"text-[11px] uppercase tracking-[0.18em] text-violet-300/80\">The problem<\u002Fspan>\n          <h2 class=\"mt-3 text-4xl sm:text-5xl font-semibold tracking-tight gradient-text\">\n            One machine. Five lives.\n          <\u002Fh2>\n          <p class=\"mt-4 text-white/55 text-lg\">\n            Your computer doesn't know if you're writing, gaming, or in a meeting. So it dumps everything in the same desktop and lets you sort it out.\n          <\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"mt-12 grid gap-4 md:grid-cols-3\">\n          <div v-for=\"(p, i) in problems\" :key=\"p.t\" class=\"reveal rounded-3xl border hairline glass p-7 relative overflow-hidden\">\n            <div class=\"absolute -top-10 -right-10 h-32 w-32 rounded-full\" :style=\"{ background: 'radial-gradient(circle, '+p.glow+', transparent 70%)' }\"><\u002Fdiv>\n            <div class=\"relative\">\n              <div class=\"text-[11px] font-mono text-white/40\">0{{ i+1 }} / 03<\u002Fdiv>\n              <h3 class=\"mt-2 text-xl font-semibold tracking-tight\">{{ p.t }}<\u002Fh3>\n              <p class=\"mt-2 text-sm text-white/55 leading-relaxed\">{{ p.d }}<\u002Fp>\n              <div class=\"mt-6 flex items-center gap-2 text-xs font-mono text-violet-300/90\">\n                <svg class=\"h-3.5 w-3.5\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"m5 13 4 4L19 7\"><\u002Fpath><\u002Fsvg>\n                {{ p.fix }}\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ─────────────────────────  FEATURES GRID  ───────────────────────── -->\n    <section id=\"features\" class=\"relative py-12 sm:py-16\">\n      <div class=\"mx-auto max-w-7xl px-5\">\n        <div class=\"flex items-end justify-between flex-wrap gap-6\">\n          <div class=\"max-w-2xl reveal\">\n            <span class=\"text-[11px] uppercase tracking-[0.18em] text-cyan-300/80\">Features<\u002Fspan>\n            <h2 class=\"mt-3 text-4xl sm:text-5xl font-semibold tracking-tight gradient-text\">\n              Built for context switching.\n            <\u002Fh2>\n          <\u002Fdiv>\n          <p class=\"reveal max-w-md text-white/55\">\n            Six primitives. Compose them into any mode you can imagine — and rebind every one to a hotkey.\n          <\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"mt-12 grid gap-4 sm:grid-cols-2 lg:grid-cols-3\">\n          <div v-for=\"(f, i) in features\" :key=\"f.t\" class=\"reveal group rounded-3xl border hairline glass p-7 relative overflow-hidden hover:border-violet-400/30 transition\">\n            <div class=\"absolute inset-x-0 top-0 h-px opacity-0 group-hover:opacity-100 transition\" style=\"background: linear-gradient(90deg, transparent, rgba(167,139,250,.6), transparent)\"><\u002Fdiv>\n            <div class=\"flex items-center justify-between\">\n              <div class=\"h-11 w-11 rounded-xl border hairline flex items-center justify-center bg-white/[.03]\" :style=\"{ color: f.tone }\">\n                <span v-html=\"f.icon\"><\u002Fspan>\n              <\u002Fdiv>\n              <span class=\"text-[10px] font-mono text-white/30\">#{{ String(i+1).padStart(2,'0') }}<\u002Fspan>\n            <\u002Fdiv>\n            <h3 class=\"mt-5 text-lg font-semibold tracking-tight\">{{ f.t }}<\u002Fh3>\n            <p class=\"mt-2 text-sm text-white/55 leading-relaxed\">{{ f.d }}<\u002Fp>\n            <div v-if=\"f.chip\" class=\"mt-5 inline-flex items-center gap-1.5 text-[11px] font-mono text-white/55 border hairline rounded-full px-2.5 py-1\">\n              <span class=\"h-1 w-1 rounded-full bg-violet-400\"><\u002Fspan>{{ f.chip }}\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ─────────────────────────  LIVE DEMO  ───────────────────────── -->\n    <section id=\"demo\" class=\"relative py-12 sm:py-16\">\n      <div class=\"mx-auto max-w-7xl px-5\">\n        <div class=\"grid grid-cols-1 lg:grid-cols-12 gap-10 items-start\">\n          <div class=\"lg:col-span-5 min-w-0 reveal lg:sticky lg:top-28\">\n            <span class=\"text-[11px] uppercase tracking-[0.18em] text-violet-300/80\">Live demo<\u002Fspan>\n            <h2 class=\"mt-3 text-4xl sm:text-5xl font-semibold tracking-tight gradient-text\">\n              Watch a mode switch.\n            <\u002Fh2>\n            <p class=\"mt-4 text-white/55 text-lg leading-relaxed\">\n              Every step streams as a checklist — the same panel you'll see in the app. Tap any mode to replay.\n            <\u002Fp>\n\n            <div class=\"mt-7 inline-flex rounded-xl border hairline glass p-1\">\n              <button v-for=\"(m, i) in modes\" :key=\"'sw-'+m.id\" @click=\"runDemo(i)\" class=\"px-3.5 py-1.5 text-sm rounded-lg transition\" :class=\"demoMode === i ? 'bg-white/10 text-[#16142b] dark:text-white' : 'text-white/55 hover:text-white/80'\">\n                {{ m.label }}\n              <\u002Fbutton>\n            <\u002Fdiv>\n\n            <div class=\"mt-6 grid grid-cols-2 gap-3 max-w-sm\">\n              <div class=\"rounded-xl border hairline p-3 glass\">\n                <div class=\"text-[10px] font-mono text-white/40 uppercase tracking-wider\">Elapsed<\u002Fdiv>\n                <div class=\"text-xl font-semibold mt-1 font-mono\">{{ elapsed.toFixed(1) }}s<\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"rounded-xl border hairline p-3 glass\">\n                <div class=\"text-[10px] font-mono text-white/40 uppercase tracking-wider\">Steps<\u002Fdiv>\n                <div class=\"text-xl font-semibold mt-1 font-mono\">{{ doneSteps }} / {{ demoSteps.length }}<\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <button @click=\"runDemo(demoMode)\" class=\"mt-5 inline-flex items-center gap-2 text-sm text-violet-300 hover:text-violet-200 transition\">\n              <svg class=\"h-4 w-4\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 12a9 9 0 1 0 3-6.7L3 8m0-5v5h5\"><\u002Fpath><\u002Fsvg>\n              Replay\n            <\u002Fbutton>\n          <\u002Fdiv>\n\n          <div class=\"lg:col-span-7 min-w-0 reveal\">\n            <div class=\"mock-dark rounded-3xl border hairline glass overflow-hidden shadow-glow\">\n              <div class=\"win-bar flex items-center justify-between px-4 py-2.5 border-b hairline\">\n                <div class=\"flex items-center gap-2\">\n                  <span class=\"h-2.5 w-2.5 rounded-full bg-white/20\"><\u002Fspan>\n                  <span class=\"h-2.5 w-2.5 rounded-full bg-white/20\"><\u002Fspan>\n                  <span class=\"h-2.5 w-2.5 rounded-full bg-white/20\"><\u002Fspan>\n                  <span class=\"ml-3 text-[11px] font-mono text-white/45\">mode.switch( {{ modes[demoMode].label.toLowerCase() }} )<\u002Fspan>\n                <\u002Fdiv>\n                <span class=\"text-[11px] font-mono text-white/40\">stream://progress<\u002Fspan>\n              <\u002Fdiv>\n\n              <div class=\"p-6 sm:p-8 bg-[#0a0915]\">\n                <!-- From → To banner -->\n                <div class=\"mb-5 flex items-center justify-between flex-wrap gap-3\">\n                  <div class=\"flex items-center gap-3\">\n                    <div class=\"flex items-center gap-2 px-3 py-1.5 rounded-lg border hairline\">\n                      <span class=\"h-2 w-2 rounded-full\" :style=\"{ background: modes[demoFrom].dot }\"><\u002Fspan>\n                      <span class=\"text-sm text-white/85\">{{ modes[demoFrom].label }}<\u002Fspan>\n                      <span class=\"text-[10px] font-mono text-white/40\">closing<\u002Fspan>\n                    <\u002Fdiv>\n                    <svg class=\"h-4 w-4 text-white/30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14m-5-5 5 5-5 5\"><\u002Fpath><\u002Fsvg>\n                    <div class=\"flex items-center gap-2 px-3 py-1.5 rounded-lg border border-violet-400/30 bg-violet-500/10\">\n                      <span class=\"h-2 w-2 rounded-full\" :style=\"{ background: modes[demoMode].dot, boxShadow: '0 0 10px '+modes[demoMode].dot }\"><\u002Fspan>\n                      <span class=\"text-sm text-white/95\">{{ modes[demoMode].label }}<\u002Fspan>\n                      <span class=\"text-[10px] font-mono text-violet-200/80\">opening<\u002Fspan>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                  <div class=\"text-[10px] font-mono text-white/40\">close → open · atomic<\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- Two phases -->\n                <div v-for=\"phaseDef in ['close','open']\" :key=\"'ph-'+phaseDef\" class=\"mb-4\">\n                  <div class=\"flex items-center gap-2 mb-2 px-1\">\n                    <span class=\"text-[10px] font-mono uppercase tracking-[0.18em]\" :class=\"phaseDef==='close' ? 'text-rose-300/80' : 'text-violet-300/80'\">\n                      {{ phaseDef==='close' ? '1 · Close previous' : '2 · Open next' }}\n                    <\u002Fspan>\n                    <span class=\"flex-1 h-px\" :class=\"phaseDef==='close' ? 'bg-gradient-to-r from-rose-400/30 via-rose-400/10 to-transparent' : 'bg-gradient-to-r from-violet-400/30 via-violet-400/10 to-transparent'\"><\u002Fspan>\n                    <span class=\"text-[10px] font-mono\" :class=\"phaseGate(phaseDef) === 'done' ? 'text-emerald-300/80' : phaseGate(phaseDef) === 'active' ? (phaseDef==='close' ? 'text-rose-300' : 'text-violet-300') : 'text-white/30'\">\n                      {{ phaseGate(phaseDef) === 'done' ? '✓ complete' : phaseGate(phaseDef) === 'active' ? 'running' : 'pending' }}\n                    <\u002Fspan>\n                  <\u002Fdiv>\n\n                  <div class=\"space-y-2\">\n                    <div v-for=\"(s, i) in stepsForPhase(phaseDef)\" :key=\"'d-'+phaseDef+'-'+i\" class=\"flex items-start gap-4 rounded-2xl border p-3.5 transition\" :class=\"[\n                           stepStateGlobal(s.absIdx) === 'pending' ? 'opacity-50 border-white/8' :\n                           stepStateGlobal(s.absIdx) === 'active' ? (phaseDef==='close' ? 'bg-rose-500/[.04] border-rose-400/30' : 'bg-violet-500/[.04] border-violet-400/30') :\n                           (phaseDef==='close' ? 'border-rose-400/15 bg-white/[.02]' : 'border-violet-400/15 bg-white/[.02]')\n                         ]\">\n                      <div class=\"mt-0.5 h-7 w-7 rounded-lg flex items-center justify-center shrink-0\" :class=\"[\n                             stepStateGlobal(s.absIdx) === 'pending' ? 'bg-white/5 text-white/30 border hairline' :\n                             stepStateGlobal(s.absIdx) === 'active' ? (phaseDef==='close' ? 'bg-rose-500/25 text-white border border-rose-400/60' : 'bg-violet-500/30 text-white border border-violet-400/60') :\n                             (phaseDef==='close' ? 'bg-rose-500/15 text-rose-200 border border-rose-400/30' : 'bg-violet-500/15 text-violet-200 border border-violet-400/30')\n                           ]\">\n                        <svg v-if=\"stepStateGlobal(s.absIdx) === 'done'\"       <div v-for=\"(k, ki) in row\" :key=\"'k-'+ri+'-'+ki\" class=\"key relative overflow-hidden rounded-md border flex items-end justify-start px-1.5 pb-1 text-[9px] font-mono select-none transition\" :style=\"{ flex: k.w, minWidth: (k.w*22)+'px', height: '34px',\n                                     background: isKeyHot(k.code) ? 'linear-gradient(180deg,#3a2a6d,#22184a)' : 'rgba(255,255,255,.02)' }\" :class=\"[\n                             isKeyHot(k.code) ? 'border-violet-400/70 text-white shadow-[0_0_18px_rgba(167,139,250,.55)]' : 'border-white/10 text-white/55',\n                             k.code === pressed ? 'translate-y-[1px] brightness-125' : ''\n                           ]\">\n                        <span class=\"relative\">{{ k.l }}<\u002Fspan>\n                        <span v-if=\"isKeyHot(k.code)\" class=\"absolute top-1 right-1 h-1 w-1 rounded-full bg-violet-300\"><\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n\n                  <!-- Visualized chord -->\n                  <div class=\"mt-4 flex items-center justify-between flex-wrap gap-3\">\n                    <div class=\"flex items-center gap-1.5\">\n                      <kbd v-for=\"k in bindings[hkActive].combo\" :key=\"'big-'+k\" class=\"px-2 min-w-[34px] h-8 rounded-lg text-xs font-mono inline-flex items-center justify-center border border-violet-400/40 bg-violet-500/15 text-white\">{{ k }}<\u002Fkbd>\n                      <svg class=\"h-4 w-4 text-white/40 mx-1\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14m-5-5 5 5-5 5\"><\u002Fpath><\u002Fsvg>\n                      <span class=\"px-2.5 h-8 inline-flex items-center rounded-lg text-xs border hairline text-white/85\">\n                        switch <span class=\"font-mono ml-1.5\" :style=\"{ color: bindings[hkActive].dot }\">{{ bindings[hkActive].label.toLowerCase() }}<\u002Fspan>\n                      <\u002Fspan>\n                    <\u002Fdiv>\n                    <span class=\"text-[10px] font-mono text-white/40\">no app capture · works from anywhere<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- Close → Open transition strip -->\n                <div class=\"mt-5 rounded-2xl border hairline overflow-hidden\">\n                  <div class=\"flex items-center justify-between px-4 py-2 border-b hairline bg-white/[.02]\">\n                    <span class=\"text-[10px] font-mono uppercase tracking-[0.14em] text-white/45\">transition pipeline<\u002Fspan>\n                    <span class=\"text-[10px] font-mono text-white/35\">{{ phaseLabel }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <div class=\"grid grid-cols-1 sm:grid-cols-2 divide-y sm:divide-y-0 sm:divide-x divide-white/5\">\n                    <!-- CLOSING -->\n                    <div class=\"p-4\">\n                      <div class=\"flex items-center gap-2\">\n                        <span class=\"text-[10px] font-mono text-white/40 uppercase tracking-wider\">1. Closing<\u002Fspan>\n                        <svg v-if=\"phase==='closing'\" class=\"h-3 w-3 animate-spin text-rose-300\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M21 12a9 9 0 1 1-3-6.7\"><\u002Fpath><\u002Fsvg>\n                        <svg v-else-if=\"phase==='opening' || phase==='done'\" class=\"h-3 w-3 text-emerald-300\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"3\"><path d=\"m5 13 4 4L19 7\"><\u002Fpath><\u002Fsvg>\n                      <\u002Fdiv>\n                      <div class=\"mt-2 flex items-center gap-2\">\n                        <span class=\"h-2 w-2 rounded-full shrink-0\" :style=\"{ background: bindings[hkFrom].dot }\"><\u002Fspan>\n                        <span class=\"text-sm text-white/85\">{{ bindings[hkFrom].label }}<\u002Fspan>\n                        <span class=\"text-[10px] font-m       <span v-for=\"(app, i) in modes[hkActive].tiles\" :key=\"'to-'+i\" class=\"text-[10px] font-mono px-1.5 py-0.5 rounded border transition\" :class=\"((phase==='opening' &amp;&amp; i &lt;= openStep) || phase==='done') ? 'text-violet-200 border-violet-400/30 bg-violet-500/10' : 'text-white/30 border-white/10'\">\n                          {{ app.app }}\n                        <\u002Fspan>\n                      <\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n\n                <!-- Event feed -->\n                <div class=\"mt-5 rounded-2xl border hairline overflow-hidden\">\n                  <div class=\"flex items-center justify-between px-4 py-2 border-b hairline bg-white/[.02]\">\n                    <span class=\"text-[10px] font-mono uppercase tracking-[0.14em] text-white/45\">press log<\u002Fspan>\n                    <span class=\"text-[10px] font-mono text-white/35\">{{ events.length }} events<\u002Fspan>\n                  <\u002Fdiv>\n                  <div class=\"divide-y divide-white/5\">\n                    <div v-for=\"(e, i) in events\" :key=\"'e-'+e.id\" class=\"flex items-center gap-3 px-4 py-2.5 text-[12px] font-mono transition\" :class=\"i === 0 ? 'bg-violet-500/[.05]' : ''\">\n                      <span class=\"text-white/35 w-20 shrink-0\">{{ e.time }}<\u002Fspan>\n                      <div class=\"flex items-center gap-1 shrink-0\">\n                        <kbd v-for=\"k in e.combo\" :key=\"e.id+'-'+k\" class=\"px-1.5 h-5 rounded text-[9px] inline-flex items-center justify-center border hairline bg-white/5 text-white/75\">{{ k }}<\u002Fkbd>\n                      <\u002Fdiv>\n                      <svg class=\"h-3 w-3 text-white/30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14m-5-5 5 5-5 5\"><\u002Fpath><\u002Fsvg>\n                      <span class=\"flex items-center gap-1.5 truncate min-w-0\">\n                        <span class=\"inline-flex items-center gap-1 text-rose-200/70\">\n                          <span class=\"h-1.5 w-1.5 rounded-full\" :style=\"{ background: e.fromDot }\"><\u002Fspan>\n                          closed {{ e.from.toLowerCase() }}\n                        <\u002Fspan>\n                        <svg class=\"h-3 w-3 text-white/30\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M5 12h14m-5-5 5 5-5 5\"><\u002Fpath><\u002Fsvg>\n                        <span class=\"inline-flex items-center gap-1 text-violet-200\">\n                          <span class=\"h-1.5 w-1.5 rounded-full\" :style=\"{ background: e.dot }\"><\u002Fspan>\n                          opened {{ e.label.toLowerCase() }}\n                        <\u002Fspan>\n                      <\u002Fspan>\n                      <span class=\"ml-auto text-white/35 shrink-0\">{{ e.dur }}<\u002Fspan>\n                    <\u002Fdiv>\n                    <div v-if=\"events.length === 0\" class=\"px-4 py-6 text-center text-[12px] text-white/40 font-mono\">\n                      Listening for hotkeys…\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ─────────────────────────  CLI SHOWCASE  ───────────────────────── -->\n    <section id=\"cli\" class=\"relative py-12 sm:py-16\">\n      <div class=\"mx-auto max-w-7xl px-5\">\n        <div class=\"grid grid-cols-1 lg:grid-cols-12 gap-10 items-start\">\n          <div class=\"lg:col-span-7 min-w-0 order-2 lg:order-2 reveal\">\n            <div class=\"mock-dark terminal rounded-3xl border hairline overflow-hidden shadow-glow\">\n              <div class=\"win-bar flex items-center justify-between px-4 py-2.5 border-b hairline\">\n                <div class=\"flex items-center gap-2\">\n                  <span class=\"h-2.5 w-2.5 round ) => {\n      clearInterval(typeT); clearInterval(lineT);\n      cliIdx.value = i;\n      cliTyped.value = '';\n      cliVisible.value = [];\n      const cmd = cliCmds[i].prompt;\n      let pos = 0;\n      typeT = setInterval(() => {\n        if (pos <= cmd.length) { cliTyped.value = cmd.slice(0, pos); pos++; }\n        else {\n          clearInterval(typeT);\n          // reveal lines\n          let li = 0;\n          const out = cliCmds[i].out;\n          lineT = setInterval(() => {\n            if (li < out.length) { cliVisible.value.push(out[li]); li++; }\n            else clearInterval(lineT);\n          }, 90);\n        }\n      }, 50);\n    };\n\n    const setCli = (i) => { clearInterval(cycleCli); playCli(i); cycleCli = setInterval(autoNextCli, 9000); };\n    const autoNextCli = () => playCli((cliIdx.value + 1) % cliCmds.length);\n\n    onMounted(() => {\n      playCli(0);\n      cycleCli = setInterval(autoNextCli, 9000);\n    });\n    onUnmounted(() => { clearInterval(typeT); clearInterval(lineT); clearInterval(cycleCli); });\n\n    /* ───── pricing benefits ───── */\n    const benefits = [\n      'Unlimited modes — Work, Focus, Gaming, Study, anything',\n      'Free updates for life — every release, including v2',\n      'License covers your machine (re-bind anytime)',\n      '7-day offline grace period · activates online once',\n      '30-day no-questions refund',\n      'Email support from the team that builds it',\n    ];\n\n    /* ───── licensing steps ───── */\n    const steps = [\n      { t:'Buy', d:'Checkout in 30 seconds via Paddle. Cards, PayPal, Apple/Google Pay.',\n        icon:'<svg class=\"h-5 w-5\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 5h4l2 12h10l2-8H6\"/><circle cx=\"10\" cy=\"20\" r=\"1.5\"/><circle cx=\"18\" cy=\"20\" r=\"1.5\"/><\u002Fsvg>' },\n      { t:'Get your key', d:'A UUID-v4 license key lands in your inbox the moment payment clears.',\n        icon:'<svg class=\"h-5 w-5\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 7l9 6 9-6M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2\"/><\u002Fsvg>' },\n      { t:'Activate in app', d:'Paste the key into suko. Validates online once, then go.',\n        icon:'<svg class=\"h-5 w-5\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><circle cx=\"12\" cy=\"12\" r=\"3\"/><path d=\"M12 2v3M12 19v3M2 12h3M19 12h3\"/><\u002Fsvg>' },\n      { t:'Launch', d:'Create your first mode. Tap a hotkey. Watch your desktop change.',\n        icon:'<svg class=\"h-5 w-5\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"m5 12 4 4L19 6\"/><\u002Fsvg>' },\n    ];\n\n    /* ───── FAQ ───── */\n    const faqs = [\n      { q:'Is it really Windows-only?', a:'Yes — suko uses Windows-specific APIs (FancyZones-style window tiling, Discord update.exe wiring, PowerShell launch hooks) that don\\'t have Mac/Linux equivalents. macOS and Linux are on the roadmap but not committed.' },\n      { q:'What exactly is a \"mode\"?',  a:'A named bundle: a list of apps to open (with launch arguments, browser URLs, terminal startup commands), a window layout to apply, system settings to set (volume, brightness, DND), and a hotkey to trigger it. Modes can also chain — switching from one mode automatically closes its apps before the next loads.' },\n      { q:'Can I get a refund?',        a:'Yes, no questions asked, within 30 days of purchase. Email refund@suko.app with your license key. Paddle issues the refund directly.' },\n      { q:'I lost my license key.',     a:'Email hello@suko.app from the address you bought with. We re-send keys within one business day, usually within an hour.' },\n      { q:'Does it work offline?',      a:'After the first online activation, the license validates locally with a 7-day rolling grace period. Hop on a plane, work from a cabin — switching modes never requires internet u want, and the friction you hit today. Sketches and screenshots welcome.' },\n      question : { title:'How do I bind a chord that includes a function key?',\n                   body:'Ask away. We answer most questions within a day.' },\n    };\n    const fbSeverities = [\n      { id:'low',      label:'Low',      glyph:'○', activeCls:'border-emerald-400/40 bg-emerald-500/10 text-emerald-200' },\n      { id:'normal',   label:'Normal',   glyph:'◐', activeCls:'border-amber-400/40   bg-amber-500/10   text-amber-200'   },\n      { id:'high',     label:'High',     glyph:'◑', activeCls:'border-orange-400/40  bg-orange-500/10  text-orange-200'  },\n      { id:'critical', label:'Critical', glyph:'●', activeCls:'border-rose-400/40    bg-rose-500/10    text-rose-200'    },\n    ];\n    const fbAreas = ['Hotkeys','Window layout','CLI','Modes','Licensing','UI','Other'];\n    const fbWhatHappens = [\n      { t:'Routed in minutes',  d:'Your message lands in our team queue with severity & area pre-tagged.',\n        icon:'<svg class=\"h-4 w-4\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 7l9 6 9-6M3 7v10a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V7M3 7a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2\"/><\u002Fsvg>' },\n      { t:'Reproduced & tracked', d:'Bugs become public issues with a ticket ID you can follow.',\n        icon:'<svg class=\"h-4 w-4\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 2v2M12 20v2M2 12h2M20 12h2\"/><circle cx=\"12\" cy=\"12\" r=\"5\"/><\u002Fsvg>' },\n      { t:'Shipped in a patch', d:'Most bug fixes ship within 1–2 weeks. Ideas land in the next minor.',\n        icon:'<svg class=\"h-4 w-4\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M12 3v12m0 0 4-4m-4 4-4-4M5 21h14\"/><\u002Fsvg>' },\n    ];\n\n    const blankFb = () => ({\n      type:'bug', title:'', body:'', email:'', version:'',\n      severity:'normal', area:'Hotkeys', diag:true,\n      sending:false, submitted:false, ticket:null,\n      errors:{},\n    });\n    const fb = reactive(blankFb());\n\n    const validateFb = () => {\n      const e = {};\n      if (!fb.title.trim() || fb.title.trim().length < 4) e.title = 'Give it a short title (4+ characters)';\n      if (!fb.body.trim()  || fb.body.trim().length  < 10) e.body  = 'A few sentences help us a lot (10+ characters)';\n      if (!fb.email.trim() || !/^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(fb.email)) e.email = 'We need a valid email to follow up';\n      fb.errors = e;\n      return Object.keys(e).length === 0;\n    };\n\n    const submitFeedback = () => {\n      if (!validateFb()) return;\n      fb.sending = true;\n      setTimeout(() => {\n        fb.sending = false;\n        fb.submitted = true;\n        fb.ticket = 'SUK-' + Math.floor(1000 + Math.random()*9000);\n      }, 900);\n    };\n\n    const resetFeedback = () => {\n      const fresh = blankFb();\n      Object.keys(fb).forEach(k => { fb[k] = fresh[k]; });\n    };\n\n    /* ───── footer ───── */\n    const footer = [\n      { title:'Product', links:[\n        { label:'Download', href:'#download' },\n        { label:'Pricing',  href:'#pricing'  },\n        { label:'Changelog',href:'#'         },\n        { label:'Roadmap',  href:'#'         },\n      ]},\n      { title:'Resources', links:[\n        { label:'Docs',      href:'#'   },\n        { label:'CLI guide', href:'#cli'},\n        { label:'Modes recipes', href:'#'   },\n        { label:'Status',    href:'#'   },\n      ]},\n      { title:'Support', links:[\n        { label:'Send feedback',  href:'#feedback' },\n        { label:'Email us',       href:'mailto:hello@suko.app' },\n        { label:'Refund policy',  href:'#'  },\n        { label:'License lookup', href:'#'  },\n      ]},\n      { title:'Legal', links:[\n        { label:'Privacy',   href:'privacy.html' },\n        { label:'Terms',     href:'#' },\n        { label:'Refunds',   href:'#' },\n        { label:'Imprint',   href:'#' },\n      ]},\n    ];\n\n    /* ───── interactions ───── */\n    const openCheckout = () => {\n      // Real impl would call Paddle.Checkout.open({ items: [{ priceId: pri_xxx }] })\n      alert('Paddle checkout overlay would open here.\\n\\nWiring: Paddle.Checkout.open({ items: [{ priceId: import.meta.env.NEXT_PUBLIC_PADDLE_PRICE_ID }] })');\n    };\n\n    const toggleTheme = () => {\n      isDark.value = !isDark.value;\n      document.documentElement.classList.toggle('dark', isDark.value);\n    };\n\n    /* scroll + reveal */\n    const onScroll = () => { scrolled.value = (window.scrollY || document.documentElement.scrollTop || 0) > 8; };\n    const goSection = (id) => {\n      mobileOpen.value = false;\n      const el = document.getElementById(id);\n      if (!el) return;\n      const top = el.getBoundingClientRect().top + (window.scrollY || document.documentElement.scrollTop || 0) - 80;\n      window.scrollTo({ top, behavior: 'smooth' });\n    };\n    onMounted(() => {\n      window.addEventListener('scroll', onScroll, { passive: true });\n      onScroll();\n      // Scroll-spy via IntersectionObserver (immune to which element scrolls)\n      nextTick(() => {\n        const spyEls = nav.map(n => document.getElementById(n.id)).filter(Boolean);\n        const visible = new Map();\n        const spy = new IntersectionObserver((entries) => {\n          entries.forEach(e => {\n            if (e.isIntersecting) visible.set(e.target.id, e.intersectionRatio);\n            else visible.delete(e.target.id);\n          });\n          // pick the section nearest the top that is currently crossing the band\n          let pick = '';\n          for (const n of nav) { if (visible.has(n.id)) { pick = n.id; break; } }\n          if (pick) activeSection.value = pick;\n        }, { rootMargin: '-45% 0px -50% 0px', threshold: 0 });\n        spyEls.forEach(el => spy.observe(el));\n      });\n      // Reveal observer\n      nextTick(() => {\n        const els = document.querySelectorAll('.reveal');\n        const io = new IntersectionObserver((entries) => {\n          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('in'); io.unobserve(e.target); } });\n        }, { rootMargin: '-40px' });\n        els.forEach(el => io.observe(el));\n      });\n      // First demo run\n      runDemo(0);\n    });\n    onUnmounted(() => window.removeEventListener('scroll', onScroll));\n\n    return {\n      isDark, scrolled, activeSection, mobileOpen, goSection, price, active, nav, modes, currentMode, setMode, tileUI, appIcon, clockHM, stats, problems, features,\n      demoMode, demoFrom, demoIdx, demoSteps, doneSteps, elapsed, stepState, runDemo, stepsForPhase, stepStateGlobal, phaseGate,\n      cliCmds, cliIdx, cliTyped, cliVisible, setCli,\n      bindings, hkActive, hkFrom, phase, phaseLabel, closeStep, openStep, addingBinding, pressed, events, isKeyHot, firePress, keyboard,\n      benefits, steps, faqs, footer, openCheckout, toggleTheme,\n      privacyStays, privacyPoints,\n      fbTypes, fbPlaceholders, fbSeverities, fbAreas, fbWhatHappens, fb, submitFeedback, resetFeedback,\n    };\n  }\n}).mount('#app');\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
